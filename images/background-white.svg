<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Sfondo radiale in scala di grigi -->
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Glow esterno grigio -->
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="75%" stop-color="#cccccc" stop-opacity="0"/>
      <stop offset="90%" stop-color="#cccccc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#cccccc" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow per l’aeroplanino -->
    <filter id="planeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cerchio di sfondo -->
  <circle cx="128" cy="128" r="122" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="125" fill="url(#ringGlow)"/>

  <!-- Aeroplanino hi-tech in scala di grigi -->
  <g filter="url(#planeGlow)" transform="translate(128,128) rotate(-30) translate(-128,-128)">
    <polygon points="52,148 178,88 155,170 122,150" fill="#9c9c9c"/>
    <polygon points="122,150 134,175 155,170" fill="#6e6e6e"/>
    <polyline points="52,148 178,88 155,170" fill="none" stroke="#e6e6e6" stroke-width="1.5" opacity="0.8"/>
    <circle cx="134" cy="175" r="3.5" fill="#d0d0d0"/>
    <circle cx="134" cy="175" r="1.5" fill="#ffffff"/>
  </g>

  <!-- Circuiti luminosi in grigio -->
  <g stroke="#d0d0d0" stroke-width="0.8" opacity="0.25" fill="none">
    <line x1="20" y1="80" x2="236" y2="80"/>
    <line x1="20" y1="176" x2="236" y2="176"/>
    <line x1="80" y1="20" x2="80" y2="236"/>
    <line x1="176" y1="20" x2="176" y2="236"/>
    <circle cx="80" cy="80" r="3" fill="#d0d0d0"/>
    <circle cx="176" cy="176" r="3" fill="#d0d0d0"/>
  </g>
</svg>
